<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Как устроиться?</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body {
      height: 100%;
      margin: 0; padding: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    body.job-bg {
      background: url('img/job-bg.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      height: 100vh;
      width: 100vw;
      position: relative;
      overflow: hidden;
    }

    .back-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 20;
      text-decoration: none;
      cursor: pointer;
    }
    .back-img {
      width: 120px;
      height: auto;
      display: block;
      transition: transform .13s;
    }
    .back-btn:hover .back-img {
      transform: scale(1.07) rotate(-1.5deg);
      filter: brightness(1.13);
    }
    @media (max-width: 600px) {
      .back-img { width: 70px; }
    }

    .job-container {
      min-height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      position: relative;
      overflow: auto;
      padding-top: 28px;
      padding-bottom: 28px;
    }
    .job-header {
      text-align: center;
      color: #fff;
      font-size: 2em;
      font-weight: bold;
      margin-top: 45px;
      margin-bottom: 6px;
      letter-spacing: 1.5px;
      text-shadow: 0 3px 16px #244c2055, 0 1px 5px #000b;
    }
    .job-subheader {
      text-align: center;
      color: #fff;
      font-size: 1.17em;
      margin-bottom: 25px;
      letter-spacing: 0.2px;
      text-shadow: 0 2px 7px #144c0d73;
    }

    /* 2x2 сетка */
    .steps-grid {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 22px 28px;
      justify-content: center;
      align-items: center;
      padding: 0 6vw;
      margin: 0 auto 22px;
      box-sizing: border-box;
    }
    .step {
      background: none;
      border: none;
      box-shadow: none;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      font-size: 1.12em;
      font-weight: bold;
      padding: 0;
      margin: 0;
    }
    .step img {
      width: 145px;
      height: 145px;
      max-width: 30vw;
      max-height: 28vw;
      margin-bottom: 12px;
      background: none;
      border-radius: 24px;
      object-fit: contain;
      box-shadow: none;
      border: none;
      transition: transform .17s;
    }
    .step img:hover {
      transform: scale(1.05) rotate(-2deg);
      filter: brightness(1.14);
    }
    .step-title {
      margin-top: 0;
    }

    .job-footer {
      text-align: center;
      font-size: 1.11em;
      color: #fff;
      margin: 25px 0 6px;
      text-shadow: 0 2px 10px #244c2066,0 1px 2px #00000066;
    }
    .arrow-link {
      display: inline-flex;
      align-items: center;
      font-size: 1.03em;
      color: #ffd600;
      margin-top: 11px;
      text-decoration: none;
      font-weight: bold;
      background: transparent;
      padding: 10px 27px 10px 17px;
      border-radius: 13px;
      transition: color .19s;
      box-shadow: none;
      cursor: pointer;
      border: none;
    }
    .arrow-link:hover {
      color: #fffdcc;
      text-decoration: underline;
    }
    .arrow {
      font-size: 1.7em;
      margin-left: 13px;
    }

    @media (max-width: 850px) {
      .steps-grid {
        display: block;
        padding: 0 1vw;
        max-width: 98vw;
      }
      .step {
        margin: 29px auto;
        width: 98vw;
        max-width: 440px;
      }
      .step img {
        width: 44vw;
        height: 44vw;
        max-width: 220px;
        max-height: 220px;
      }
    }
    @media (max-height: 600px) {
      .job-header { margin-top: 15px; font-size: 1.15em;}
      .job-container { padding-top: 4px; padding-bottom: 4px; }
    }
    @media (max-width: 480px), (max-height: 450px) {
      .steps-grid { gap: 0 0; }
      .step img { width: 48vw; height: 48vw; }
      .job-header { font-size: 1.03em; }
      .job-subheader { font-size: 0.93em; }
    }
  </style>
</head>
<body class="job-bg">
  <a href="index.html" class="back-btn">
    <img src="img/back.png" alt="Назад" class="back-img">
  </a>
  <div class="job-container">

    <div class="job-header">Как устроиться?</div>
    <div class="job-subheader">Четыре простых шага</div>

    <div class="steps-grid">
      <!-- 1 шаг -->
      <div class="step">
        <img src="img/manager.png" alt="Проконсультироваться с менеджером">
        <div class="step-title">Проконсультироваться с менеджером</div>
      </div>
      <!-- 2 шаг -->
      <div class="step">
        <img src="img/deposit.png" alt="Внести залог">
        <div class="step-title">Внести залог</div>
      </div>
      <!-- 3 шаг -->
      <div class="step">
        <img src="img/study.png" alt="Быстро пройти обучение">
        <div class="step-title">Быстро пройти обучение</div>
      </div>
      <!-- 4 шаг -->
      <div class="step">
        <img src="img/money.png" alt="Начни зарабатывать">
        <div class="step-title">Начни зарабатывать</div>
      </div>
    </div>

    <div class="job-footer">
      Всё это ты можешь сделать по&nbsp;ссылке:<br>
      <a class="arrow-link" href="#" id="siteBtn">
        boborganic.to <span class="arrow">&#10148;</span>
      </a>
    </div>
  </div>
  <script>
    document.getElementById('siteBtn').addEventListener('click', function(event) {
      event.preventDefault();
      if (confirm('ВНИМАНИЕ!\nВход на наш сайт возможен только с включённым VPN.\nПродолжить?')) {
        window.location.href = 'https://boborganic.to/';
      }
    });
  </script>
</body>
</html>
